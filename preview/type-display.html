<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .specimen { border-bottom: 1px solid var(--color-stone); padding-bottom: 14px; }
  .specimen:last-child { border-bottom: none; }
  .meta { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-pebble); margin-bottom: 6px; }
</style></head><body>
  <div class="specimen">
    <div class="meta">Display — Playfair Display SC Bold</div>
    <div style="font-family:var(--font-display);font-size:48px;font-weight:700;line-height:1.1;letter-spacing:0.04em;color:var(--color-forest-deep);">Pickle Master</div>
  </div>
  <div class="specimen">
    <div class="meta">H1 — Playfair Display SC Bold · 56px</div>
    <div class="t-h1" style="font-size:clamp(32px,4vw,48px);">Hong Kong's Premier Club</div>
  </div>
  <div class="specimen">
    <div class="meta">H2 — Playfair Display Bold · 40px</div>
    <div class="t-h2" style="font-size:clamp(24px,3vw,36px);">Master Your Game</div>
  </div>
  <div class="specimen">
    <div class="meta">H3 — Playfair Display Bold · 32px</div>
    <div class="t-h3" style="font-size:clamp(20px,2.5vw,28px);">Court Booking & Sessions</div>
  </div>
</body></html>
