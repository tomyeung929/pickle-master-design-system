<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--color-stone); padding: 8px 0; }
  .scale { font-family: var(--font-sans); font-size: 10px; color: var(--color-pebble); width: 60px; flex-shrink: 0; }
  .px { font-family: var(--font-sans); font-size: 10px; color: var(--color-stone); width: 36px; }
  .sample { font-family: var(--font-display); color: var(--color-forest-deep); line-height: 1; }
</style></head><body>
  <div class="row"><div class="scale">5xl</div><div class="px">80px</div><div class="sample" style="font-size:48px;">Aa</div></div>
  <div class="row"><div class="scale">4xl</div><div class="px">56px</div><div class="sample" style="font-size:40px;">Aa</div></div>
  <div class="row"><div class="scale">3xl</div><div class="px">40px</div><div class="sample" style="font-size:32px;">Aa</div></div>
  <div class="row"><div class="scale">2xl</div><div class="px">32px</div><div class="sample" style="font-size:26px;">Aa</div></div>
  <div class="row"><div class="scale">xl</div><div class="px">24px</div><div class="sample" style="font-size:22px;">Aa</div></div>
  <div class="row"><div class="scale">lg</div><div class="px">20px</div><div class="sample" style="font-size:19px;">Aa</div></div>
  <div class="row"><div class="scale">base</div><div class="px">16px</div><div class="sample" style="font-family:var(--font-sans);font-size:16px;font-weight:400;">Aa — Body text</div></div>
  <div class="row"><div class="scale">sm</div><div class="px">14px</div><div class="sample" style="font-family:var(--font-sans);font-size:14px;font-weight:400;">Aa — Small text</div></div>
  <div class="row"><div class="scale">xs</div><div class="px">12px</div><div class="sample" style="font-family:var(--font-sans);font-size:12px;font-weight:400;">Aa — Caption / meta</div></div>
</body></html>
