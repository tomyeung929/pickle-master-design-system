<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-pebble); margin-bottom: 10px; }
  .btn { font-family: var(--font-label); letter-spacing: 0.12em; text-transform: uppercase; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--color-gold); color: var(--color-forest-deep); padding: 14px 28px; border-radius: var(--radius-pill); box-shadow: var(--shadow-gold); }
  .btn-primary:hover { background: var(--color-gold-dark); }
  .btn-dark { background: var(--color-forest-deep); color: var(--color-gold); padding: 14px 28px; border-radius: var(--radius-pill); }
  .btn-outline { background: transparent; color: var(--color-forest-deep); padding: 13px 28px; border-radius: var(--radius-pill); border: 1.5px solid var(--color-forest-deep); }
  .btn-outline-gold { background: transparent; color: var(--color-gold); padding: 13px 28px; border-radius: var(--radius-pill); border: 1.5px solid var(--color-gold); }
  .btn-sm { padding: 9px 18px; font-size: 11px; border-radius: var(--radius-pill); background: var(--color-gold); color: var(--color-forest-deep); }
  .btn-sharp { border-radius: var(--radius-sm); background: var(--color-forest-deep); color: var(--color-cream); padding: 12px 24px; }
  .btn-disabled { background: var(--color-stone); color: var(--color-pebble); padding: 14px 28px; border-radius: var(--radius-pill); cursor: not-allowed; }
  .on-dark { background: var(--color-forest-deep); border-radius: 10px; padding: 16px; }
</style></head><body>
  <div>
    <div class="label">Primary — Gold / Pill</div>
    <div class="row">
      <button class="btn btn-primary">Book a Session</button>
      <button class="btn btn-primary btn-sm">Join Now</button>
    </div>
  </div>
  <div>
    <div class="label">Dark — Forest / Pill</div>
    <div class="row"><button class="btn btn-dark">Become a Member</button></div>
  </div>
  <div>
    <div class="label">Outlined</div>
    <div class="row">
      <button class="btn btn-outline">View Schedule</button>
      <div class="on-dark"><button class="btn btn-outline-gold">Learn More</button></div>
    </div>
  </div>
  <div>
    <div class="label">Sharp / Angular variant</div>
    <div class="row"><button class="btn btn-sharp">Court Info</button></div>
  </div>
  <div>
    <div class="label">Disabled State</div>
    <div class="row"><button class="btn btn-disabled" disabled>Court Full</button></div>
  </div>
</body></html>
