<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); padding: 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .logo-ring { width: 160px; height: 160px; border-radius: 50%; overflow: hidden; box-shadow: 0 4px 24px rgba(15,61,36,0.25); }
  .logo-ring img { width: 100%; height: 100%; object-fit: cover; }
  .on-dark { background: var(--color-forest-deep); border-radius: 12px; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .monogram { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--color-gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 16px; color: var(--color-gold); font-weight: 700; }
  .wordmark { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.06em; color: var(--color-cream); font-weight: 700; }
  .sub { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--color-gold); margin-top: 2px; }
</style></head><body>
  <div class="logo-ring"><img src="../assets/logo.jpg" alt="Pickle Master Logo"></div>
  <div class="on-dark">
    <div class="monogram">PM</div>
    <div>
      <div class="wordmark">Pickle Master</div>
      <div class="sub">Pickleball Club · Hong Kong</div>
    </div>
  </div>
</body></html>
