<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); font-family: var(--font-sans); padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .swatch { width: 110px; }
  .chip { height: 80px; border-radius: var(--radius-md); margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-ink); margin-bottom: 2px; }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--color-pebble); }
</style></head><body>
  <div class="swatch"><div class="chip" style="background:#1A1208;"></div><div class="name">Ink</div><div class="hex">#1A1208</div></div>
  <div class="swatch"><div class="chip" style="background:#9E8E78;"></div><div class="name">Pebble</div><div class="hex">#9E8E78</div></div>
  <div class="swatch"><div class="chip" style="background:#D6CBBA;"></div><div class="name">Stone</div><div class="hex">#D6CBBA</div></div>
  <div class="swatch"><div class="chip" style="background:#F5F0E8;"></div><div class="name">Cream</div><div class="hex">#F5F0E8</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF;"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
</body></html>
