<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-cream); font-family: var(--font-sans); padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .swatch { width: 110px; }
  .chip { height: 80px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .name { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-ink); margin-bottom: 2px; }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--color-pebble); }
  .pantone { font-size: 9px; color: var(--color-pebble); margin-top: 2px; }
</style></head><body>
  <div class="swatch"><div class="chip" style="background:#0F3D24;"></div><div class="name">Forest Deep</div><div class="hex">#0F3D24</div></div>
  <div class="swatch"><div class="chip" style="background:#1C4F3A;"></div><div class="name">Forest</div><div class="hex">#1C4F3A</div><div class="pantone">Pantone 5545C</div></div>
  <div class="swatch"><div class="chip" style="background:#5E8474;"></div><div class="name">Court Sage</div><div class="hex">#5E8474</div><div class="pantone">Pantone 556C</div></div>
  <div class="swatch"><div class="chip" style="background:#C4A87A;"></div><div class="name">Court Tan</div><div class="hex">#C4A87A</div><div class="pantone">Pantone 4675C</div></div>
  <div class="swatch"><div class="chip" style="background:#C9A84C; box-shadow: 0 2px 10px rgba(201,168,76,0.4);"></div><div class="name">Gold</div><div class="hex">#C9A84C</div></div>
  <div class="swatch"><div class="chip" style="background:#E2C97E;"></div><div class="name">Gold Light</div><div class="hex">#E2C97E</div></div>
  <div class="swatch"><div class="chip" style="background:#9A7A2E;"></div><div class="name">Gold Dark</div><div class="hex">#9A7A2E</div></div>
</body></html>
