<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Master — Club App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { background: #1C4F3A; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
  /* Phone shell */
  .phone { width: 390px; height: 844px; background: #F5F0E8; border-radius: 48px; overflow: hidden; position: relative; box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 10px #1A1208, 0 0 0 12px #333; display: flex; flex-direction: column; }
  .status-bar { background: #0F3D24; height: 48px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: #F5F0E8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons span { display: block; background: #F5F0E8; border-radius: 2px; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
  .screen::-webkit-scrollbar { display: none; }
  /* Nav */
  .bottom-nav { height: 80px; background: #0F3D24; border-top: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: space-around; padding: 0 8px; flex-shrink: 0; padding-bottom: 12px; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 16px; border-radius: 12px; transition: background 0.15s; }
  .nav-item.active { background: rgba(201,168,76,0.12); }
  .nav-icon { width: 22px; height: 22px; }
  .nav-label { font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #9E8E78; }
  .nav-item.active .nav-label { color: #C9A84C; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [screen, setScreen] = useState('home');

  return (
    <div className="phone">
      <div className="status-bar">
        <span className="status-time">9:41</span>
        <div className="status-icons">
          <span style={{width:15,height:10,borderRadius:2,background:'#F5F0E8',opacity:0.9}}></span>
          <span style={{width:3,height:10,borderRadius:1}}></span>
          <span style={{width:10,height:10,borderRadius:5}}></span>
        </div>
      </div>
      <div className="screen">
        {screen === 'home'    && <HomeScreen onNavigate={setScreen} />}
        {screen === 'book'    && <BookScreen onNavigate={setScreen} />}
        {screen === 'courts'  && <CourtsScreen onNavigate={setScreen} />}
        {screen === 'profile' && <ProfileScreen onNavigate={setScreen} />}
      </div>
      <BottomNav active={screen} onNavigate={setScreen} />
    </div>
  );
}

function BottomNav({ active, onNavigate }) {
  const items = [
    { id: 'home',    label: 'Home',    icon: HomeIcon },
    { id: 'book',    label: 'Book',    icon: CalIcon },
    { id: 'courts',  label: 'Courts',  icon: CourtIcon },
    { id: 'profile', label: 'Profile', icon: UserIcon },
  ];
  return (
    <nav className="bottom-nav">
      {items.map(({ id, label, icon: Icon }) => (
        <div key={id} className={`nav-item ${active === id ? 'active' : ''}`} onClick={() => onNavigate(id)}>
          <Icon active={active === id} />
          <span className="nav-label">{label}</span>
        </div>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
