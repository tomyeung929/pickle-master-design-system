<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Master 匹匠 — Premier Indoor Pickleball Club · Hong Kong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="/website/lang.js"></script>
<script>
window.STRIPE_PK = 'pk_test_REPLACE_WITH_YOUR_STRIPE_PUBLISHABLE_KEY';

window.API = {
  getToken: function() {
    try { return JSON.parse(localStorage.getItem('pm_light_state') || '{}').token || null; } catch { return null; }
  },
  headers: function() {
    var t = window.API.getToken();
    var h = { 'Content-Type': 'application/json' };
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  },
  get: function(path) {
    return fetch(path, { headers: window.API.headers() }).then(function(r) { return r.json(); });
  },
  post: function(path, body) {
    return fetch(path, { method: 'POST', headers: window.API.headers(), body: JSON.stringify(body) }).then(function(r) { return r.json(); });
  },
  saveToken: function(token, user) {
    try {
      var s = JSON.parse(localStorage.getItem('pm_light_state') || '{}');
      s.token = token;
      s.user = user;
      localStorage.setItem('pm_light_state', JSON.stringify(s));
    } catch {}
  },
  clearToken: function() {
    try {
      var s = JSON.parse(localStorage.getItem('pm_light_state') || '{}');
      delete s.token;
      delete s.user;
      localStorage.setItem('pm_light_state', JSON.stringify(s));
    } catch {}
  },
};
</script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #FDFAF5; font-family: 'DM Sans', system-ui, sans-serif; color: #1A1208; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F5F0E8; }
  ::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 3px; }
  input, textarea, select, button { font-family: inherit; }
  a { color: inherit; }

  @media (max-width: 768px) {
    .book-main-grid { grid-template-columns: 1fr !important; }
    .contact-main-grid { grid-template-columns: 1fr !important; }
    .account-main-grid { grid-template-columns: 1fr !important; }
    .courts-cta-grid { grid-template-columns: 1fr !important; }
    .lessons-grid { grid-template-columns: 1fr !important; }
    .cart-sidebar { width: 100% !important; }
    section { padding-left: 16px !important; padding-right: 16px !important; }
  }
  @media (max-width: 640px) {
    .coach-cta-col { display: none !important; }
    .tournament-action { flex-direction: column !important; }
    .shop-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important; }
    .membership-grid { grid-template-columns: 1fr !important; }
    .howto-grid { grid-template-columns: 1fr !important; }
    .nav-lang-btn { padding: 3px 8px !important; font-size: 10px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/website/shared-light.jsx"></script>
<script type="text/babel" src="/website/HomePage-light.jsx"></script>
<script type="text/babel" src="/website/MemberPage-light.jsx"></script>
<script type="text/babel" src="/website/BookPage.jsx"></script>
<script type="text/babel" src="/website/OtherPages-light.jsx"></script>
<script type="text/babel" src="/website/MorePages-light.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const stored = (() => { try { return JSON.parse(localStorage.getItem('pm_light_state') || '{}'); } catch { return {}; } })();

  const [lang,       setLang]       = useState(stored.lang      || 'EN');
  const [page,       setPage]       = useState(stored.page      || 'home');
  const [user,       setUser]       = useState(stored.user      || null);
  const [cart,       setCart]       = useState(stored.cart      || []);
  const [cartOpen,   setCartOpen]   = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);

  useEffect(() => {
    const stored = JSON.parse(localStorage.getItem('pm_light_state') || '{}');
    localStorage.setItem('pm_light_state', JSON.stringify({ ...stored, lang, page, user, cart }));
  }, [lang, page, user, cart]);

  useEffect(() => {
    const stored = JSON.parse(localStorage.getItem('pm_light_state') || '{}');
    if (stored.token) {
      window.API.get('/api/auth/me').then(res => {
        if (res.error) {
          window.API.clearToken();
          setUser(null);
        } else {
          setUser(res.user);
        }
      }).catch(() => {});
    }
    const params = new URLSearchParams(window.location.search);
    if (params.get('subscription') === 'success') {
      const tier = params.get('tier');
      if (tier && user) setUser(u => ({ ...u, tier }));
      window.history.replaceState({}, '', '/');
    }
  }, []);

  useEffect(() => {
    window.scrollTo({ top: 0 });
    setMobileOpen(false);
  }, [page]);

  function addToCart(item) {
    setCart(c => [...c, item]);
    setCartOpen(true);
  }

  const sharedProps = { lang, setPage, user, setUser, cart, addToCart };

  return (
    <>
      <window.Nav
        page={page} setPage={setPage}
        lang={lang} setLang={setLang}
        user={user} setUser={setUser}
        cart={cart} setCartOpen={setCartOpen}
        mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
      />

      <main>
        {page === 'home'       && <window.HomePage      {...sharedProps} />}
        {page === 'member'     && <window.MemberPage    {...sharedProps} />}
        {page === 'book'       && <window.BookPage      {...sharedProps} />}
        {page === 'social'     && <window.SocialPage    {...sharedProps} />}
        {page === 'private'    && <window.PrivatePage   {...sharedProps} />}
        {page === 'contact'    && <window.ContactPage   {...sharedProps} />}
        {page === 'login'      && <window.LoginPage     {...sharedProps} />}
        {page === 'account'    && <window.AccountPage   {...sharedProps} />}
        {page === 'coaches'    && <window.CoachesPage   {...sharedProps} />}
        {page === 'tournament' && <window.TournamentPage {...sharedProps} />}
        {page === 'shop'       && <window.ShopPage      {...sharedProps} />}
        {page === 'faq'        && <window.FAQPage       {...sharedProps} />}
      </main>

      <window.Footer setPage={setPage} lang={lang} />

      <window.CartSidebar
        open={cartOpen} onClose={() => setCartOpen(false)}
        cart={cart} setCart={setCart}
        lang={lang} setPage={setPage} user={user}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
